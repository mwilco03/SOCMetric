name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: linux
          - platform: windows-latest
            target: windows
          - platform: macos-latest
            target: macos

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest run

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'SOC Dashboard ${{ github.ref_name }}'
          releaseBody: |
            ## SOC Dashboard ${{ github.ref_name }}

            ### Downloads
            - **Windows**: `.msi` (installer) or `.exe` (NSIS setup)
            - **macOS**: `.dmg` (disk image)
            - **Linux**: `.deb` (Debian/Ubuntu) or `.AppImage` (universal)

            ### What's included
            - 12 metric modules (lead time decomposition, cluster analysis, incident impact, projections)
            - 9 dashboard chapters with real computed data
            - Seasonal decomposition for 6+ month datasets
            - Client-side AES-256-GCM encryption for Jira credentials
            - After-hours/weekend work detection
            - Two-layer KPI tooltips with methodology detail
          releaseDraft: false
          prerelease: false
